# --- Flyway: разрешаем авто-ремонт и очистку, если есть конфликт миграций ---
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.flyway.repair-on-migrate=true

# На тестах можно валидировать схему после миграции
spring.jpa.hibernate.ddl-auto=none

# Обязательное свойство для ProvisionController
provision.secret=test-secret

# Если используешь встроенную БД на тестах, раскомментируй это (пример для H2):
# spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Если тесты идут против локального Postgres, оставь свои настройки DataSource в test-профиле.
